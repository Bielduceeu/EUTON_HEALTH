<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <style>
        :root {
            --bg-light: #eef4fb;
            --bg-soft: #f8fbff;
            --surface: rgba(255, 255, 255, 0.72);
            --surface-strong: rgba(255, 255, 255, 0.88);
            --text-main: #1d314f;
            --text-muted: #657087;
            --border: rgba(91, 120, 162, 0.22);
            --accent: #3d76d7;
            --error: #a33c4a;
            --error-soft: rgba(163, 60, 74, 0.12);
            --radius: 24px;
            --shadow: 0 24px 60px rgba(40, 70, 120, 0.12);
            --transition: 220ms ease;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", system-ui, sans-serif;
            color: var(--text-main);
            background: radial-gradient(circle at top left, rgba(58, 108, 191, 0.14), transparent 24%),
                        radial-gradient(circle at bottom right, rgba(102, 144, 204, 0.12), transparent 20%),
                        linear-gradient(180deg, var(--bg-light), var(--bg-soft));
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 28rem;
            height: 28rem;
            border-radius: 50%;
            filter: blur(38px);
            opacity: 0.32;
            z-index: -1;
            pointer-events: none;
        }

        body::before {
            top: -9rem;
            left: -7rem;
            background: rgba(68, 103, 177, 0.24);
        }

        body::after {
            right: -8rem;
            bottom: -8rem;
            background: rgba(118, 156, 202, 0.2);
        }

        .page-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
        }

        .cadastro-card {
            width: min(540px, 100%);
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.72);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .card-header {
            padding: 2rem 2rem 1.5rem;
            background: rgba(255, 255, 255, 0.86);
            border-bottom: 1px solid rgba(255, 255, 255, 0.78);
        }

        .card-header h1 {
            margin: 0;
            font-size: clamp(2rem, 2.4vw, 2.5rem);
            letter-spacing: -0.04em;
        }

        .card-header p {
            margin: 0.85rem 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .card-body {
            padding: 2rem;
            display: grid;
            gap: 1rem;
        }

        .form-group {
            display: grid;
            gap: 0.5rem;
        }

        label {
            font-size: 0.94rem;
            font-weight: 600;
            color: rgba(29, 45, 78, 0.92);
        }

        input {
            width: 100%;
            min-height: 3.4rem;
            padding: 0.92rem 1rem;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.85);
            color: #22334f;
            font-size: 1rem;
            transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
        }

        input:focus {
            outline: none;
            border-color: rgba(61, 118, 215, 0.55);
            box-shadow: 0 0 0 6px rgba(61, 118, 215, 0.12);
            transform: translateY(-1px);
        }

        .field-error {
            min-height: 1.25rem;
            font-size: 0.88rem;
            color: var(--error);
        }

        .global-error {
            padding: 1rem 1rem;
            border-radius: 18px;
            background: var(--error-soft);
            border: 1px solid rgba(163, 60, 74, 0.24);
            color: #7a2a36;
            font-size: 0.94rem;
            line-height: 1.6;
        }

        .submit-area {
            display: grid;
            gap: 0.85rem;
            margin-top: 0.2rem;
        }

        .btn-submit {
            min-height: 3.7rem;
            border: none;
            border-radius: 999px;
            padding: 0 1.35rem;
            background: linear-gradient(180deg, #3f7ddf 0%, #2357a6 100%);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 16px 28px rgba(35, 72, 135, 0.18);
            transition: transform var(--transition), box-shadow var(--transition), filter var(--transition);
        }

        .btn-submit:hover,
        .btn-submit:focus-visible {
            transform: translateY(-1px);
            filter: brightness(1.04);
            box-shadow: 0 18px 32px rgba(35, 72, 135, 0.24);
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .login-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link:hover,
        .login-link:focus-visible {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .card-header,
            .card-body {
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <article class="cadastro-card" aria-labelledby="cadastro-title">
            <header class="card-header">
                <h1 id="cadastro-title">Criar Conta</h1>
                <p>Cadastre-se para acessar a plataforma com segurança e simplicidade.</p>
            </header>

            <section class="card-body">
                <form th:action="@{/cadastroUsuario}" method="post" th:object="${usuario}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div th:if="${#fields.hasGlobalErrors()}" class="global-error" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" type="email" th:field="*{email}" placeholder="seuemail@exemplo.com" required>
                        <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input id="senha" type="password" th:field="*{senha}" placeholder="Crie uma senha segura" required>
                        <small class="field-error" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></small>
                    </div>

                    <div class="form-group">
                        <label for="confirmSenha">Confirmar senha</label>
                        <input id="confirmSenha" type="password" name="confirmSenha" placeholder="Repita a senha" required>
                        <small class="field-error"></small>
                    </div>

                    <div class="submit-area">
                        <button type="submit" class="btn-submit">Cadastrar</button>
                        <div class="footer-row">
                            <span>Já tem conta?</span>
                            <a th:href="@{/login}" class="login-link">Faça login</a>
                        </div>
                    </div>
                </form>
            </section>
        </article>
    </main>
</body>
</html>
